<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Scanner Código de Barras</title>

  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    :root {
      --bg: #f7efff;
      --card: #ffffff;
      --primary: #7b2cbf;
      --primary-2: #9d4edd;
      --secondary: #e0c3fc;
      --text: #2b2b2b;
      --muted: #666;
      --border: #d6c7e8;
      --ok: #0f8a4b;
      --ok-bg: #e8f7ef;
      --error: #b42318;
      --error-bg: #fdecec;
      --info: #173b5c;
      --info-bg: #eef6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 18px;
      color: var(--text);
    }

    .contenedor {
      max-width: 560px;
      margin: auto;
      background: var(--card);
      padding: 22px;
      border-radius: 22px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.14);
    }

    h1 {
      text-align: center;
      color: var(--primary);
      margin-bottom: 5px;
    }

    .subtitulo {
      text-align: center;
      color: #555;
      font-size: 14px;
      margin-bottom: 18px;
      line-height: 1.4;
    }

    .seccion {
      background: #fff;
      border: 1px solid #eadff7;
      border-radius: 18px;
      padding: 14px;
      margin-top: 14px;
    }

    video {
      width: 100%;
      border-radius: 16px;
      background: #000;
      margin-top: 12px;
      display: none;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
      color: #3c096c;
    }

    input, textarea {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      border: 1px solid #cfcfcf;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary-2);
      box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.15);
    }

    input[readonly] {
      background: #f7f7f7;
      color: #555;
    }

    textarea {
      min-height: 85px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-principal {
      background: var(--primary-2);
      color: white;
    }

    .btn-secundario {
      background: var(--secondary);
      color: #3c096c;
    }

    .btn-error {
      background: #ffccd5;
      color: #9d0208;
    }

    .mensaje {
      margin-top: 12px;
      text-align: center;
      font-weight: bold;
      min-height: 24px;
    }

    .ok {
      color: var(--ok);
    }

    .error {
      color: #d00000;
    }

    .preview {
      background: #faf7ff;
      border: 1px dashed #b185db;
      border-radius: 14px;
      padding: 12px;
      margin-top: 18px;
      font-size: 14px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    .nota {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.4;
    }

    .info-box {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
      display: none;
    }

    .ok-box {
      display: block;
      background: var(--ok-bg);
      border: 1px solid #b8e7ca;
      color: var(--ok);
    }

    .error-box {
      display: block;
      background: var(--error-bg);
      border: 1px solid #f5b4ae;
      color: var(--error);
    }

    .info-box-visible {
      display: block;
      background: var(--info-bg);
      border: 1px solid #cfe4fb;
      color: var(--info);
    }

    .archivo {
      background: #faf7ff;
      border: 1px solid #eadff7;
    }

</head>

    <h1>📷 Scanner</h1>
    <p class="subtitulo">
      Escanea código de barras, registra datos y guarda evidencias en Google Sheets.
    </p>

    <div class="seccion">
      <label>Pandape de quien registra</label>
      <input
        id="pandape"
        placeholder="Escribe tu Pandape"
        oninput="validarPandapeManual()"
      />

      <div id="infoPandape" class="info-box"></div>

      <label>Nombre completo</label>
      <input
        id="nombreCompleto"
        placeholder="Aquí aparecerá el nombre automáticamente"
        readonly
      />
    </div>

    <div class="seccion">
      <button class="btn-principal" onclick="iniciarScanner()">
        Abrir cámara y escanear
      </button>

      <video id="video"></video>

      <button class="btn-error" onclick="marcarErroneo()">
        No se pudo escanear / Marcar ERRÓNEO
      </button>

      <label>Código de barras detectado</label>
      <input id="codigoBarras" placeholder="Aquí aparecerán los dígitos o ERRÓNEO" readonly />
    </div>

    <div class="seccion">
      <label>Últimos 4 dígitos de tarjeta</label>
      <input
        id="ultimos4"
        inputmode="numeric"
        maxlength="4"
        placeholder="Ej. 4821"
        oninput="soloNumeros(this, 4)"
      />

      <label>Folio</label>
      <input
        id="folio"
        inputmode="numeric"
        placeholder="Ej. 17753126"
        oninput="soloNumeros(this, 20)"
      />

      <label>Determinante</label>
      <input
        id="determinante"
        inputmode="numeric"
        maxlength="4"
        placeholder="Solo 4 números. Ej. 0013"
        oninput="validarDeterminanteManual()"
      />

      <div id="infoTienda" class="info-box"></div>

      <label>Nombre de tienda</label>
      <input
        id="nombreTienda"
        placeholder="Aquí aparecerá la tienda automáticamente"
        readonly
      />

      <div class="nota">La determinante debe tener exactamente 4 números.</div>

      <label>Fecha de venta</label>
      <input id="fechaVenta" type="date" />

      <label>Comentarios</label>
      <textarea id="comentarios">Tengo una duda</textarea>
    </div>

    <div class="seccion">
      <label>Evidencia QR</label>
      <input
        id="evidenciaQR"
        class="archivo"
        type="file"
        accept="image/*"
        capture="environment"
      />
      <div class="nota">Sube o toma foto de la evidencia QR.</div>

      <label>Evidencia Compra Mensual</label>
      <input
        id="evidenciaCompra"
        class="archivo"
        type="file"
        accept="image/*"
        capture="environment"
      />
      <div class="nota">Sube o toma foto de la evidencia de compra mensual.</div>
    </div>

    <button class="btn-principal" onclick="guardarEnGoogleSheets()">
      Guardar en Google Sheets
    </button>

    <button class="btn-secundario" onclick="copiarRegistro()">
      Copiar registro sin tarjeta
    </button>

    <button class="btn-secundario" onclick="limpiarFormulario()">
      Nueva captura
    </button>

    <div id="mensaje" class="mensaje"></div>

    <div id="preview" class="preview">
      Aquí aparecerá el registro generado.
    </div>
  </div>

    document.addEventListener("DOMContentLoaded", function () {

    function fechaHoyLocal() {
      const hoy = new Date();
      const yyyy = hoy.getFullYear();
      const mm = String(hoy.getMonth() + 1).padStart(2, "0");
      const dd = String(hoy.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function ponerFechaHoy() {
      document.getElementById("fechaVenta").value = fechaHoyLocal();

    function soloNumeros(input, max) {
      input.value = input.value.replace(/\D/g, "").slice(0, max);
    }

    function mostrarCaja(id, texto, tipo) {
      const caja = document.getElementById(id);
      caja.textContent = texto;

    function limpiarPandape(valor) {
      return String(valor || "").trim().toUpperCase().replace(/\s+/g, "");
    }

    function validarPandapeManual() {
      const input = document.getElementById("pandape");
      const nombreCompleto = document.getElementById("nombreCompleto");

      input.value = limpiarPandape(input.value);
      usuarioPandape = null;
      nombreCompleto.value = "";

      const pandape = input.value.trim();

      if (!pandape) {
        const info = document.getElementById("infoPandape");
        info.textContent = "";
        info.className = "info-box";
        return;
      }

      if (pandape.length < 3) {
        mostrarCaja("infoPandape", "Captura tu Pandape para buscar tu nombre.", "info-box-visible");
        return;
      }

      clearTimeout(timerPandape);

      timerPandape = setTimeout(() => {
        buscarPandape(pandape);
      }, 500);
    }

    function buscarPandapeEnAppsScript(pandape) {
      return new Promise((resolve, reject) => {
        const callbackName = "callbackPandape_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");

        const timeout = setTimeout(() => {
          limpiar();
          reject(new Error("Tiempo de espera agotado"));
        }, 10000);

        function limpiar() {
          clearTimeout(timeout);
          delete window[callbackName];
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = function (respuesta) {
          limpiar();
          resolve(respuesta);
        };

        script.onerror = function () {
          limpiar();
          reject(new Error("No se pudo consultar el Pandape"));
        };

        script.src =
          SCRIPT_URL +
          "?accion=buscar_pandape" +
          "&pandape=" + encodeURIComponent(pandape) +
          "&callback=" + encodeURIComponent(callbackName);

        document.body.appendChild(script);
      });
    }

    async function buscarPandape(pandape) {
      const token = ++consultaPandapeActual;

      mostrarCaja("infoPandape", "Buscando Pandape...", "info-box-visible");

      try {
        const respuesta = await buscarPandapeEnAppsScript(pandape);

        if (token !== consultaPandapeActual) return;

        if (!respuesta || !respuesta.encontrado) {
          usuarioPandape = null;
          document.getElementById("nombreCompleto").value = "";
          mostrarCaja("infoPandape", "PANDAPE NO ENCONTRADO", "error-box");
          return;
        }

        usuarioPandape = {
          pandape: respuesta.pandape,
          nombre_completo: respuesta.nombre_completo
        };

        document.getElementById("nombreCompleto").value = respuesta.nombre_completo;
        mostrarCaja("infoPandape", "Usuario encontrado correctamente.", "ok-box");

      } catch (error) {
        console.error(error);
        usuarioPandape = null;
        document.getElementById("nombreCompleto").value = "";
        mostrarCaja("infoPandape", "No se pudo consultar el Pandape. Revisa tu Apps Script.", "error-box");
      }
    }

    function buscarTiendasPorDeterminante(determinante) {
      return TIENDAS.filter(tienda => tienda.id === determinante);
    }

    function validarDeterminanteManual() {
      const input = document.getElementById("determinante");
      const nombreTienda = document.getElementById("nombreTienda");

      input.value = input.value.replace(/\D/g, "").slice(0, 4);

      const determinante = input.value.trim();
      nombreTienda.value = "";

      if (!determinante) {
        const info = document.getElementById("infoTienda");
        info.textContent = "";
        info.className = "info-box";
        return;
      }

      if (determinante.length < 4) {
        mostrarCaja("infoTienda", "Captura los 4 números de la determinante.", "info-box-visible");
        return;
      }

      const tiendas = buscarTiendasPorDeterminante(determinante);

      if (tiendas.length === 0) {
        mostrarCaja("infoTienda", "TIENDA NO ENCONTRADA", "error-box");
        nombreTienda.value = "";
        return;
      }

      const nombres = tiendas.map(tienda => tienda.nombre).join(" / ");
      nombreTienda.value = nombres;
      mostrarCaja("infoTienda", "Tienda encontrada correctamente.", "ok-box");
    }

    function obtenerTiendaSeleccionada() {
      const determinante = document.getElementById("determinante").value.trim();
      const tiendas = buscarTiendasPorDeterminante(determinante);

      return {
        determinante: determinante,
        tienda: tiendas.map(tienda => tienda.nombre).join(" / "),
        existe: tiendas.length > 0
      };
    }

    async function iniciarScanner() {
      const video = document.getElementById("video");
      const codigoBarras = document.getElementById("codigoBarras");

      codigoBarras.value = "";
      video.style.display = "block";

      mostrarMensaje("Abriendo cámara... acepta el permiso.", "");

      try {
        const dispositivos = await codeReader.listVideoInputDevices();

        if (!dispositivos || dispositivos.length === 0) {
          mostrarMensaje("No se encontró cámara. Se marcará como ERRÓNEO.", "error");
          codigoBarras.value = "ERRÓNEO";
          return;
        }

        const camaraTrasera =
          dispositivos.find(d =>
            d.label.toLowerCase().includes("back") ||
            d.label.toLowerCase().includes("environment") ||
            d.label.toLowerCase().includes("trasera")
          ) || dispositivos[0];

        let detectado = false;

        temporizadorScanner = setTimeout(() => {
          if (!detectado) {
            detenerScanner();
            codigoBarras.value = "ERRÓNEO";
            mostrarMensaje("No se pudo escanear. Código marcado como ERRÓNEO.", "error");
          }
        }, 15000);

        await codeReader.decodeFromVideoDevice(
          camaraTrasera.deviceId,
          video,
          (result, error) => {
            if (result) {
              detectado = true;
              clearTimeout(temporizadorScanner);

              codigoBarras.value = result.getText();

              mostrarMensaje("✅ Código detectado correctamente.", "ok");
              detenerScanner();
            }
          }
        );

      } catch (error) {
        console.error(error);
        codigoBarras.value = "ERRÓNEO";
        mostrarMensaje("No se pudo abrir la cámara. Revisa permisos o abre la liga HTTPS.", "error");
      }
    }

    function detenerScanner() {
      try {
        codeReader.reset();
        const video = document.getElementById("video");
        video.style.display = "none";

        if (temporizadorScanner) {
          clearTimeout(temporizadorScanner);
        }
      } catch (error) {
        console.error(error);
      }
    }

    function marcarErroneo() {
      detenerScanner();
      document.getElementById("codigoBarras").value = "ERRÓNEO";
      mostrarMensaje("Código marcado como ERRÓNEO.", "error");
    }

    function archivoAImagenBase64(inputFile, maxWidth = 1400, calidad = 0.75) {
      return new Promise((resolve, reject) => {
        const archivo = inputFile.files[0];

        if (!archivo) {
          resolve("");
          return;
        }

        if (!archivo.type.startsWith("image/")) {
          reject(new Error("El archivo no es imagen"));
          return;
        }

        const reader = new FileReader();

        reader.onload = function (evento) {
          const img = new Image();

          img.onload = function () {
            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            const base64 = canvas.toDataURL("image/jpeg", calidad);
            resolve(base64);
          };

          img.onerror = function () {
            reject(new Error("No se pudo procesar la imagen"));
          };

          img.src = evento.target.result;
        };

        reader.onerror = function () {
          reject(new Error("No se pudo leer la imagen"));
        };

        reader.readAsDataURL(archivo);
      });
    }

    function validarFormulario() {
      const codigoBarras = document.getElementById("codigoBarras").value.trim();
      const ultimos4 = document.getElementById("ultimos4").value.trim();
      const folio = document.getElementById("folio").value.trim();
      const determinante = document.getElementById("determinante").value.trim();
      const fechaVenta = document.getElementById("fechaVenta").value;
      const comentarios = document.getElementById("comentarios").value.trim();
      const pandape = document.getElementById("pandape").value.trim();
      const nombreCompleto = document.getElementById("nombreCompleto").value.trim();
      const tiendaSeleccionada = obtenerTiendaSeleccionada();
      const evidenciaQR = document.getElementById("evidenciaQR").files[0];
      const evidenciaCompra = document.getElementById("evidenciaCompra").files[0];

      if (!pandape) {
        mostrarMensaje("Falta capturar el Pandape de quien registra.", "error");
        return null;
      }

      if (!usuarioPandape || !nombreCompleto) {
        mostrarMensaje("El Pandape no está validado o no fue encontrado.", "error");
        return null;
      }

      if (!codigoBarras) {
        mostrarMensaje("Falta escanear el código o marcarlo como ERRÓNEO.", "error");
        return null;
      }

      if (!/^\d{4}$/.test(ultimos4)) {
        mostrarMensaje("Los últimos 4 dígitos de tarjeta deben ser exactamente 4 números.", "error");
        return null;
      }

      if (!folio) {
        mostrarMensaje("Falta capturar el folio.", "error");
        return null;
      }

      if (!/^\d{4}$/.test(determinante)) {
        mostrarMensaje("La determinante debe tener exactamente 4 números.", "error");
        return null;
      }

      if (!tiendaSeleccionada.existe) {
        mostrarMensaje("TIENDA NO ENCONTRADA. Revisa la determinante.", "error");
        return null;
      }

      if (!fechaVenta) {
        mostrarMensaje("Falta seleccionar la fecha de venta.", "error");
        return null;
      }

      if (!evidenciaQR) {
        mostrarMensaje("Falta subir la evidencia QR.", "error");
        return null;
      }

      if (!evidenciaCompra) {
        mostrarMensaje("Falta subir la evidencia de compra mensual.", "error");
        return null;
      }

      return {
        fecha_captura: new Date().toLocaleString("es-MX"),
        pandape: pandape,
        nombre_completo: nombreCompleto,
        quien_registro: nombreCompleto,
        codigo_barras: codigoBarras,
        ultimos_4_tarjeta: ultimos4,
        folio: folio,
        determinante: determinante,
        tienda: tiendaSeleccionada.tienda,
        fecha_venta: fechaVenta,
        comentarios: comentarios
      };
    }

    function actualizarPreview(registro, incluirTarjeta = true) {
      let texto = "";

      if (incluirTarjeta) {
        texto =
`FECHA CAPTURA: ${registro.fecha_captura}
PANDAPE: ${registro.pandape}
QUIÉN REGISTRÓ: ${registro.quien_registro}
CÓDIGO DE BARRAS: ${registro.codigo_barras}
ÚLTIMOS 4 TARJETA: ${registro.ultimos_4_tarjeta}
FOLIO: ${registro.folio}
DETERMINANTE: ${registro.determinante}
TIENDA: ${registro.tienda}
FECHA DE VENTA: ${registro.fecha_venta}
COMENTARIOS: ${registro.comentarios || "-"}`;
      } else {
        texto =
`FECHA CAPTURA: ${registro.fecha_captura}
PANDAPE: ${registro.pandape}
QUIÉN REGISTRÓ: ${registro.quien_registro}
CÓDIGO DE BARRAS: ${registro.codigo_barras}
FOLIO: ${registro.folio}
DETERMINANTE: ${registro.determinante}
TIENDA: ${registro.tienda}
FECHA DE VENTA: ${registro.fecha_venta}
COMENTARIOS: ${registro.comentarios || "-"}`;
      }

      document.getElementById("preview").textContent = texto;
      return texto;
    }

    async function guardarEnGoogleSheets() {
      if (!SCRIPT_URL || SCRIPT_URL.includes("PEGA_AQUI")) {
        mostrarMensaje("Falta pegar la URL de Apps Script en el código.", "error");
        return;
      }

      const registro = validarFormulario();
      if (!registro) return;

      registroActual = registro;
      actualizarPreview(registro, true);

      mostrarMensaje("Preparando evidencias y enviando registro...", "");

      try {
        const evidenciaQRBase64 = await archivoAImagenBase64(document.getElementById("evidenciaQR"));
        const evidenciaCompraBase64 = await archivoAImagenBase64(document.getElementById("evidenciaCompra"));

        const form = document.createElement("form");
        form.method = "POST";
        form.action = SCRIPT_URL;
        form.target = "iframeOculto";
        form.style.display = "none";

        const campos = {
          fecha_captura: registro.fecha_captura,
          pandape: registro.pandape,
          nombre_completo: registro.nombre_completo,
          quien_registro: registro.quien_registro,
          codigo_barras: registro.codigo_barras,
          ultimos4: registro.ultimos_4_tarjeta,
          folio: registro.folio,
          determinante: registro.determinante,
          tienda: registro.tienda,
          fecha_venta: registro.fecha_venta,
          comentarios: registro.comentarios,
          evidencia_qr_base64: evidenciaQRBase64,
          evidencia_compra_base64: evidenciaCompraBase64
        };

        Object.keys(campos).forEach(nombre => {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = nombre;
          input.value = campos[nombre];
          form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);

        mostrarMensaje("✅ Registro enviado con evidencias. Revisa la pestaña CAPTURAS.", "ok");

      } catch (error) {
        console.error(error);
        mostrarMensaje("No se pudieron procesar las evidencias. Intenta con fotos más ligeras.", "error");
      }
    }

    async function copiarRegistro() {
      const registro = validarFormulario();
      if (!registro) return;

      registroActual = registro;

      const textoSinTarjeta = actualizarPreview(registro, false);

      try {
        await navigator.clipboard.writeText(textoSinTarjeta);
        mostrarMensaje("📋 Registro copiado sin últimos 4 de tarjeta.", "ok");
      } catch (error) {
        mostrarMensaje("No se pudo copiar. Selecciona el texto manualmente.", "error");
      }
    }

    function limpiarFormulario() {
      detenerScanner();

      document.getElementById("pandape").value = "";
      document.getElementById("nombreCompleto").value = "";
      document.getElementById("codigoBarras").value = "";
      document.getElementById("ultimos4").value = "";
      document.getElementById("folio").value = "";
      document.getElementById("determinante").value = "";
      document.getElementById("nombreTienda").value = "";
      document.getElementById("evidenciaQR").value = "";
      document.getElementById("evidenciaCompra").value = "";

      ponerFechaHoy();

      document.getElementById("comentarios").value = "Tengo una duda";

      usuarioPandape = null;
      registroActual = null;

      const infoPandape = document.getElementById("infoPandape");
      infoPandape.textContent = "";
      infoPandape.className = "info-box";

      const infoTienda = document.getElementById("infoTienda");
      infoTienda.textContent = "";
      infoTienda.className = "info-box";

      document.getElementById("preview").textContent = "Aquí aparecerá el registro generado.";
      mostrarMensaje("Lista para una nueva captura.", "ok");
    }
